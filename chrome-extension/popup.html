<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Veritas</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">V</div>
      <div>
        <div class="brand-name">Veritas</div>
        <div class="brand-sub">Fitness bro fact checker</div>
      </div>
    </div>
    <div class="header-actions">
      <button
        class="status-pill status-pill-checking"
        id="statusPill"
        title="Checking backend…"
      >
        <span class="status-dot"></span>
        <span class="status-label">…</span>
      </button>
      <button class="icon-btn" id="liveToggleBtn" title="Toggle live scanning">
        <span id="liveIndicator" class="live-dot live-dot-active"></span>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>
  </header>

  <main id="app">
    <!-- Rendered by popup.js -->
  </main>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
